<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hytale Invite Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .button-group button {
            flex: 1;
        }

        .secondary-button {
            background: linear-gradient(135deg, #42b883 0%, #35495e 100%);
        }

        .secondary-button:hover {
            box-shadow: 0 5px 15px rgba(66, 184, 131, 0.4);
        }

        .checkbox-group {
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 400;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 6px;
            padding: 15px;
            color: #c33;
            margin-top: 20px;
        }

        .highlights {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .highlights h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .highlight-item {
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }

        .highlight-item label {
            display: inline-block;
            font-weight: 600;
            color: #667eea;
            margin-right: 8px;
            margin-bottom: 0;
        }

        .highlight-item span {
            color: #333;
            word-break: break-all;
        }

        .raw-json {
            background: #2d2d2d;
            color: #f8f8f2;
            border-radius: 6px;
            padding: 20px;
            overflow-x: auto;
        }

        .raw-json h3 {
            color: #f8f8f2;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .raw-json pre {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .encoded-result {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .encoded-result h3 {
            color: #2e7d32;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .encoded-result textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #4caf50;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: vertical;
            background: white;
        }

        .copy-button {
            margin-top: 10px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        }

        .copy-button:hover {
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .rewrite-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }

        .rewrite-preview {
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
        }

        .rewrite-preview.warning {
            color: #d32f2f;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Hytale Invite Decoder</h1>
        <p class="subtitle">Decode your Hytale invitation code to see server details</p>

        <div class="input-group">
            <label for="inviteCode">Paste your invitation code:</label>
            <input type="text" id="inviteCode" placeholder="Enter your base64 encoded invite code">
        </div>

        <button onclick="decodeInvite()">Decode Invite</button>

        <div id="result" class="result">
            <!-- Error messages displayed here -->
            <div id="errorContainer" class="hidden"></div>

            <!-- Key Information Section -->
            <div id="highlightsSection" class="highlights hidden">
                <h3>📋 Key Information</h3>
                <div id="serverNameItem" class="highlight-item hidden">
                    <label>Server Name:</label>
                    <span id="serverNameValue"></span>
                </div>
                <div id="hostNameItem" class="highlight-item hidden">
                    <label>Host Name:</label>
                    <span id="hostNameValue"></span>
                </div>
                <div id="ipAddressItem" class="highlight-item hidden">
                    <label>IP Address:</label>
                    <span id="ipAddressValue"></span>
                </div>
                <div id="portItem" class="highlight-item hidden">
                    <label>Port:</label>
                    <span id="portValue"></span>
                </div>
            </div>

            <!-- Rewrite Invite Code Section -->
            <div id="rewriteSection" class="highlights hidden">
                <h3>✏️ Rewrite Invite Code</h3>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="filterPublicOnly" onchange="updateRewritePreview()">
                        Only include public IPv4 addresses (filter out local/IPv6 addresses)
                    </label>
                </div>
                <p class="rewrite-description">
                    Generate a new invite code with customized settings. When enabled, only ServerReflexive addresses (public IPs) will be included.
                </p>
                <div id="rewritePreview" class="rewrite-preview"></div>
                <button class="secondary-button" onclick="rewriteBlob()">Generate New Invite Code</button>
                <div id="encodedResult"></div>
            </div>

            <!-- Raw JSON Data Section -->
            <div id="rawJsonSection" class="raw-json hidden">
                <h3>📄 Raw JSON Data</h3>
                <pre id="rawJsonContent"></pre>
            </div>
        </div>
    </div>

    <script>
        let currentDecodedData = null;

        async function decodeInvite() {
            const code = document.getElementById('inviteCode').value.trim();

            // Hide all sections first
            hideAllSections();

            if (!code) {
                showError('Please enter an invitation code');
                return;
            }

            // Check browser compatibility
            if (typeof DecompressionStream === 'undefined') {
                showError('Your browser does not support the required decompression features. Please use a modern Chrome, Edge, or Safari browser.');
                return;
            }

            try {
                // Decode base64
                const binaryString = atob(code);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Decompress using DecompressionStream (raw deflate)
                const decompressed = await decompressRawDeflate(bytes);

                // Parse JSON
                const data = JSON.parse(decompressed);

                // Validate structure
                if (!data.HostName || !Array.isArray(data.Candidates) || data.Candidates.length === 0) {
                    throw new Error('Invalid invitation structure');
                }

                // Display results
                displayResults(data);

                // Store current data for rewriting
                currentDecodedData = data;

            } catch (error) {
                showError('Invalid or corrupted invitation code: ' + escapeHtml(String(error.message)));
            }
        }

        async function decompressRawDeflate(bytes) {
            // Use DecompressionStream API for raw deflate
            const ds = new DecompressionStream('deflate-raw');
            const writer = ds.writable.getWriter();
            writer.write(bytes);
            writer.close();

            const chunks = [];
            const reader = ds.readable.getReader();
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }

            // Combine chunks
            const totalLength = chunks.reduce((acc, chunk) => acc + chunk.length, 0);
            const result = new Uint8Array(totalLength);
            let offset = 0;
            for (const chunk of chunks) {
                result.set(chunk, offset);
                offset += chunk.length;
            }

            // Convert to string
            const decoder = new TextDecoder('utf-8');
            return decoder.decode(result);
        }

        function displayResults(data) {
            // Show result container
            document.getElementById('result').classList.add('show');

            // Populate and show highlights section
            const highlightsSection = document.getElementById('highlightsSection');
            highlightsSection.classList.remove('hidden');

            // Server Name
            if (data.ServerName) {
                document.getElementById('serverNameValue').textContent = data.ServerName;
                document.getElementById('serverNameItem').classList.remove('hidden');
            } else {
                document.getElementById('serverNameItem').classList.add('hidden');
            }

            // Host Name
            if (data.HostName) {
                document.getElementById('hostNameValue').textContent = data.HostName;
                document.getElementById('hostNameItem').classList.remove('hidden');
            } else {
                document.getElementById('hostNameItem').classList.add('hidden');
            }

            // IP Address and Port from first candidate
            if (data.Candidates && data.Candidates.length > 0) {
                const candidate = data.Candidates[0];
                if (candidate.Address) {
                    document.getElementById('ipAddressValue').textContent = candidate.Address;
                    document.getElementById('ipAddressItem').classList.remove('hidden');
                } else {
                    document.getElementById('ipAddressItem').classList.add('hidden');
                }
                if (candidate.Port) {
                    document.getElementById('portValue').textContent = candidate.Port;
                    document.getElementById('portItem').classList.remove('hidden');
                } else {
                    document.getElementById('portItem').classList.add('hidden');
                }
            }

            // Show rewrite section
            document.getElementById('rewriteSection').classList.remove('hidden');
            // Reset checkbox
            document.getElementById('filterPublicOnly').checked = false;
            // Clear previous encoded result
            document.getElementById('encodedResult').innerHTML = '';

            // Show raw JSON section
            document.getElementById('rawJsonSection').classList.remove('hidden');
            document.getElementById('rawJsonContent').textContent = JSON.stringify(data, null, 2);

            // Update preview - use setTimeout to ensure DOM is ready
            setTimeout(() => updateRewritePreview(), 0);
        }

        function hideAllSections() {
            document.getElementById('errorContainer').classList.add('hidden');
            document.getElementById('highlightsSection').classList.add('hidden');
            document.getElementById('rewriteSection').classList.add('hidden');
            document.getElementById('rawJsonSection').classList.add('hidden');
            document.getElementById('result').classList.remove('show');
        }

        function showError(message) {
            hideAllSections();
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error">❌ ${escapeHtml(message)}</div>`;
            errorContainer.classList.remove('hidden');
            document.getElementById('result').classList.add('show');
        }

        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function updateRewritePreview() {
            if (!currentDecodedData) return;

            const filterPublic = document.getElementById('filterPublicOnly')?.checked || false;
            const previewDiv = document.getElementById('rewritePreview');
            
            if (!previewDiv) return;

            const originalCount = currentDecodedData.Candidates?.length || 0;
            
            if (filterPublic) {
                const filteredCount = currentDecodedData.Candidates?.filter(c => c.Type === 'ServerReflexive').length || 0;
                const removedCount = originalCount - filteredCount;
                
                if (filteredCount === 0) {
                    previewDiv.textContent = `⚠️ Warning: No ServerReflexive (public) addresses found. The filtered code may not work.`;
                    previewDiv.classList.add('warning');
                } else {
                    previewDiv.textContent = `📊 Will include ${filteredCount} address(es) and remove ${removedCount} local/IPv6 address(es)`;
                    previewDiv.classList.remove('warning');
                }
            } else {
                previewDiv.textContent = `📊 Will include all ${originalCount} address(es)`;
                previewDiv.classList.remove('warning');
            }
        }

        async function rewriteBlob() {
            if (!currentDecodedData) {
                showError('No decoded data available. Please decode an invite first.');
                return;
            }

            // Check browser compatibility
            if (typeof CompressionStream === 'undefined') {
                showError('Your browser does not support the required compression features. Please use a modern Chrome, Edge, or Safari browser.');
                return;
            }

            try {
                const filterPublic = document.getElementById('filterPublicOnly').checked;
                
                // Create a copy of the data
                const newData = JSON.parse(JSON.stringify(currentDecodedData));
                
                // Filter candidates if requested
                if (filterPublic) {
                    newData.Candidates = newData.Candidates.filter(c => c.Type === 'ServerReflexive');
                    
                    if (newData.Candidates.length === 0) {
                        showError('Cannot generate invite code: No public (ServerReflexive) addresses found in the original data.');
                        return;
                    }
                }
                
                // Encode the data
                const encoded = await encodeInvite(newData);
                
                // Display the result
                displayEncodedResult(encoded, filterPublic, newData.Candidates.length, currentDecodedData.Candidates.length);
                
            } catch (error) {
                showError('Failed to generate new invite code: ' + escapeHtml(String(error.message)));
            }
        }

        async function encodeInvite(data) {
            // Convert data to JSON string
            const jsonString = JSON.stringify(data);
            
            // Convert to bytes
            const encoder = new TextEncoder();
            const bytes = encoder.encode(jsonString);
            
            // Compress using CompressionStream (raw deflate)
            const cs = new CompressionStream('deflate-raw');
            const writer = cs.writable.getWriter();
            writer.write(bytes);
            writer.close();
            
            const chunks = [];
            const reader = cs.readable.getReader();
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
            }
            
            // Combine chunks
            const totalLength = chunks.reduce((acc, chunk) => acc + chunk.length, 0);
            const compressed = new Uint8Array(totalLength);
            let offset = 0;
            for (const chunk of chunks) {
                compressed.set(chunk, offset);
                offset += chunk.length;
            }
            
            // Convert to base64
            let binaryString = '';
            for (let i = 0; i < compressed.length; i++) {
                binaryString += String.fromCharCode(compressed[i]);
            }
            
            return btoa(binaryString);
        }

        function displayEncodedResult(encoded, filtered, newCount, originalCount) {
            const resultDiv = document.getElementById('encodedResult');
            
            let statusMessage = '';
            if (filtered) {
                statusMessage = `<p style="color: #2e7d32; margin-bottom: 10px;">✅ Successfully generated new invite code with ${newCount} public address(es) (filtered from ${originalCount} total addresses)</p>`;
            } else {
                statusMessage = `<p style="color: #2e7d32; margin-bottom: 10px;">✅ Successfully generated new invite code with all ${newCount} address(es)</p>`;
            }
            
            resultDiv.innerHTML = `
                <div class="encoded-result">
                    <h3>🎉 New Invite Code Generated</h3>
                    ${statusMessage}
                    <textarea id="newInviteCode" readonly>${escapeHtml(encoded)}</textarea>
                    <button class="copy-button" onclick="copyToClipboard(event)">📋 Copy to Clipboard</button>
                </div>
            `;
        }

        async function copyToClipboard(event) {
            const textarea = document.getElementById('newInviteCode');
            const button = event.target;
            const originalText = button.textContent;
            
            try {
                await navigator.clipboard.writeText(textarea.value);
                button.textContent = '✅ Copied!';
            } catch (error) {
                // Fallback for older browsers
                textarea.select();
                document.execCommand('copy');
                button.textContent = '✅ Copied!';
            } finally {
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            }
        }

        // Allow Enter key to decode
        document.getElementById('inviteCode').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                decodeInvite();
            }
        });
    </script>
</body>
</html>
